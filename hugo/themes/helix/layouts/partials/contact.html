<!-- Contact starts here -->
{{range $i, $v := where .Data.Pages "Type" "contact"}}
	<section id="contact">
		<div class="container">
			<div class="row">
			<div class="col-md-4 text-right">
				<h2 class="contact-left-tagline">Do you need a custom User Interface? Feel free to drop a line.</h2>
				<ul class="social">
					<li><a href="{{.Params.facebook}}">Facebook <i class="fa fa-facebook-square" aria-hidden="true"></i></a></li>
					<li><a href="{{.Params.twitter}}">Twitter <i class="fa fa-twitter-square" aria-hidden="true"></i></a></li>
					<li><a href="{{.Params.github}}">Github <i class="fa fa-github-square" aria-hidden="true"></i></a></li>
					<li><a href="{{.Params.linkedin}}">LinkedIn <i class="fa fa-linkedin-square" aria-hidden="true"></i></a></li>
					<li><a href="{{.Params.behance}}">Behance <i class="fa fa-behance" aria-hidden="true"></i></a></li>
				</ul>
			</div>
			<div class="col-md-7 contact-form">
				<form>
				  <div class="form-group">
				    <input type="text" class="form-control" name="name" placeholder="Name">
				  </div>
				  <div class="form-group">
				    <input type="text" class="form-control" name="email" placeholder="Email">
				  </div>
				  <div class="form-group">
				    <input type="text" class="form-control" name="subject" placeholder="Subject">
				  </div>
				  <div class="form-group">
				    <textarea class="form-control" name="message" placeholder="Message"></textarea>
				  </div>
				  <button type="submit" class="btn btn-default btn-lg contact-btn">Send Message</button>
				</form>
			</div>
		</div>
		</div>
	</section>
	{{end}}
	<!-- Contact ends here -->
